<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiša spominov – Ko dnevniki spregovorijo</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Hiša spominov - Digitalna knjiga">
    <meta name="theme-color" content="#8B4513">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="sredstva/naslovnica.jpg">
    
    <link rel="stylesheet" href="slog.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PageFlip Library -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registered:', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</head>
<body>
    <!-- Glavni vsebnik -->
    <div id="app">
        <!-- Naslovnica -->
        <div id="cover-page" class="cover-page">
            <div class="cover-content">
                <div class="cover-decoration"></div>
                <h1 class="cover-title">Hiša spominov</h1>
                <h2 class="cover-subtitle">Ko dnevniki spregovorijo</h2>
                <div class="cover-author">Danijel Cvijetić</div>
                <div class="cover-line"></div>
                <button id="start-reading" class="start-button">
                    <span class="button-text">Začni brati</span>
                    <span class="button-icon">→</span>
                </button>
            </div>
            <div class="cover-background"></div>
        </div>

        <!-- Flipbook vsebnik -->
        <div id="flipbook-container" class="flipbook-container hidden">
            <!-- Orodna vrstica -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <button id="back-to-cover" class="toolbar-btn" title="Nazaj na naslovnico">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <button id="prev-page" class="toolbar-btn" title="Prejšnja stran">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <button id="next-page" class="toolbar-btn" title="Naslednja stran">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>
                <div class="toolbar-center">
                    <div class="progress-container">
                        <div id="reading-progress-bar">
                            <div id="reading-progress"></div>
                        </div>
                        <span id="page-indicator">1 / 1</span>
                        <span id="pages-remaining"></span>
                    </div>
                </div>
                <div class="toolbar-right">
                    <button id="toggle-bookmark" class="toolbar-btn" title="Dodaj zaznamek">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                        </svg>
                    </button>
                    <button id="show-bookmarks" class="toolbar-btn" title="Moji zaznamki">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        </svg>
                    </button>
                    <button id="toggle-toc" class="toolbar-btn" title="Kazalo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                    <button id="toggle-night-mode" class="toolbar-btn" title="Nočni način">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                    <button id="toggle-fullscreen" class="toolbar-btn" title="Celozaslonski način">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Flipbook viewport with PageFlip -->
            <div id="flipbook-viewport">
                <div id="flipbook" class="flipbook">
                    <!-- Pages will be loaded here dynamically -->
                </div>
            </div>

            <!-- Loading indicator -->
            <div id="loading" class="loading hidden">
                <div class="loading-spinner"></div>
                <span>Nalaganje strani...</span>
            </div>
            
            <!-- Resume reading overlay -->
            <div id="resume-overlay" class="resume-overlay hidden">
                <div class="resume-content">
                    <p>Nadaljuj branje na strani <span id="resume-page-num">1</span>?</p>
                    <div class="resume-buttons">
                        <button id="resume-continue" class="resume-btn primary">Nadaljuj</button>
                        <button id="resume-start" class="resume-btn secondary">Začni od začetka</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Kazalo -->
        <div id="toc-overlay" class="toc-overlay">
            <div class="toc-content">
                <div class="toc-header">
                    <h2>Kazalo</h2>
                    <button id="close-toc" class="close-btn">&times;</button>
                </div>
                <div class="toc-list" id="toc-list">
                    <!-- Kazalo bo napolnjeno z JavaScriptom -->
                </div>
            </div>
        </div>

        <!-- Zaznamki -->
        <div id="bookmarks-overlay" class="toc-overlay">
            <div class="toc-content">
                <div class="toc-header">
                    <h2>Moji zaznamki</h2>
                    <button id="close-bookmarks" class="close-btn">&times;</button>
                </div>
                <div class="bookmarks-list" id="bookmarks-list">
                    <!-- Zaznamki bo napolnjeno z JavaScriptom -->
                </div>
            </div>
        </div>
    </div>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    
    <script src="flipbook.js"></script>
    <script src="kazalo.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing flipbook...');
            
            const pageIndicator = document.getElementById('page-indicator');
            if (pageIndicator) {
                pageIndicator.textContent = 'Nalaganje...';
            }
            
            setTimeout(function() {
                if (window.flipbook) {
                    window.flipbook.init().catch(function(err) {
                        console.error('Init error:', err);
                    });
                }
            }, 100);
        });
    </script>
</body>
</html>
