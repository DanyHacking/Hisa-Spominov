<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiša spominov – Ko dnevniki spregovorijo</title>
    <link rel="stylesheet" href="slog.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Glavni vsebnik -->
    <div id="app">
        <!-- Naslovnica -->
        <div id="cover-page" class="cover-page">
            <div class="cover-content">
                <div class="cover-decoration"></div>
                <h1 class="cover-title">Hiša spominov</h1>
                <h2 class="cover-subtitle">Ko dnevniki spregovorijo</h2>
                <div class="cover-author">Danijel Cvijetić</div>
                <div class="cover-line"></div>
                <button id="start-reading" class="start-button">
                    <span class="button-text">Začni brati</span>
                    <span class="button-icon">→</span>
                </button>
            </div>
            <div class="cover-background"></div>
        </div>

        <!-- Flipbook vsebnik -->
        <div id="flipbook-container" class="flipbook-container hidden">
            <!-- Orodna vrstica -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <button id="back-to-cover" class="toolbar-btn" title="Nazaj na naslovnico">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                    </button>
                </div>
                <div class="toolbar-center">
                    <span id="page-indicator">1 / 1</span>
                </div>
                <div class="toolbar-right">
                    <button id="toggle-toc" class="toolbar-btn" title="Kazalo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                    <button id="toggle-night-mode" class="toolbar-btn" title="Nočni način">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                    <button id="toggle-fullscreen" class="toolbar-btn" title="Celozaslonski način">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                        </svg>
                    </button>
                    <button id="toggle-zoom" class="toolbar-btn" title="Povečava">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35M11 8v6M8 11h6"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Canvas za PDF -->
            <div id="flipbook-viewport">
                <canvas id="pdf-canvas"></canvas>
            </div>

            <!-- Navigacijski gumbi -->
            <button id="prev-page" class="nav-button nav-prev" title="Prejšnja stran">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <button id="next-page" class="nav-button nav-next" title="Naslednja stran">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </button>

            <!-- Loading indicator -->
            <div id="loading" class="loading hidden">
                <div class="loading-spinner"></div>
                <span>Nalaganje strani...</span>
            </div>
        </div>

        <!-- Kazalo -->
        <div id="toc-overlay" class="toc-overlay">
            <div class="toc-content">
                <div class="toc-header">
                    <h2>Kazalo</h2>
                    <button id="close-toc" class="close-btn">&times;</button>
                </div>
                <div class="toc-list" id="toc-list">
                    <!-- Kazalo bo napolnjeno z JavaScriptom -->
                </div>
            </div>
        </div>
    </div>

    <!-- PDF.js in flipbook skripte -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Initialize PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        // Debug logging
        console.log('PDF.js loaded:', typeof pdfjsLib);
    </script>
    <script src="flipbook.js"></script>
    <script src="kazalo.js"></script>
    <script>
        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing flipbook...');
            
            // Set initial page indicator
            const pageIndicator = document.getElementById('page-indicator');
            if (pageIndicator) {
                pageIndicator.textContent = 'Nalaganje...';
            }
            
            // Wait a moment then initialize
            setTimeout(function() {
                if (window.flipbook) {
                    window.flipbook.init().catch(function(err) {
                        console.error('Init error:', err);
                    });
                }
            }, 100);
        });
    </script>
</body>
</html>
